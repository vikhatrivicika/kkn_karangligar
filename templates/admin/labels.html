<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labels Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Labels Management</h2>
        <form method="POST" action="/admin/labels">
            <label for="label_name">Label Name:</label>
            <input type="text" id="label_name" name="label_name" required>
            <button type="submit">Add Label</button>
        </form>
        <h3>Existing Labels</h3>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for label in labels %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ label.nama_tml }}</td>
                    <td>
                        <a href="/admin/edit_label/{{ label.id_tml }}">Edit</a>
                        <a href="/admin/delete_label/{{ label.id_tml }}">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
