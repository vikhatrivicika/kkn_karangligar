<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Label</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Edit Label</h2>
        <form method="POST">
            <label for="label_name">Label Name:</label>
            <input type="text" id="label_name" name="label_name" value="{{ label.nama_tml }}" required>
            <button type="submit">Update Label</button>
        </form>
    </div>
</body>
</html>
