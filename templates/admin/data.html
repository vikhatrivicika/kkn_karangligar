<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script>
        function updateActiveStatus(id, isChecked) {
            const xhr = new XMLHttpRequest();
            const url = `/admin/update_active/${id}`;
            const params = `active=${isChecked ? 1 : 0}`;
            
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xhr.send(params);

            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    alert('Status updated successfully');
                }
            };
        }
    </script>
</head>
<body>
    <h2 class="mt-4">Manage Data</h2>
    <hr>
    <form action="{{ url_for('admin') }}" method="post" enctype="multipart/form-data" class="mb-3">
        <div class="form-group">
            <label for="file">Choose file:</label>
            <input type="file" id="file" name="file" accept=".csv, .xls, .xlsx" class="form-control">
        </div>
        <div class="form-group">
            <label for="judul">Judul:</label>
            <input type="text" id="judul" name="judul" class="form-control">
        </div>
        <div class="form-group">
            <label for="keterangan">Description:</label>
            <input type="text" id="keterangan" name="keterangan" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
    <h2 class="mt-4 text-center">Data CSV or Excel</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>No</th>
                <th>File</th>
                <th>Judul</th>
                <th>Keterangan</th>
                <th>Active</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ row.nama_tmd }}</td>
                <td>{{ row.judul_tmd }}</td>
                <td>{{ row.keterangan_tmd }}</td>
                <td>
                    <input type="checkbox" {% if row.active_tmd == '1' %} checked {% endif %} 
                           onclick="updateActiveStatus({{ row.id_tmd }}, this.checked)">
                </td>
                <td>
                    <a href="/admin/edit_data/{{ row.id_tmd }}" class="btn btn-warning btn-sm">Edit</a>
               
                    <form action="/admin/delete_data/{{ row.id_tmd }}" method="post" style="display:inline;">
                        <input type="submit" value="Delete" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this item?');">
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
