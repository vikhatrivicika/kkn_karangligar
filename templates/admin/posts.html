<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Posts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script>
        function updatePostStatus(id, isChecked) {
            const xhr = new XMLHttpRequest();
            const url = `/admin/update_post_active/${id}`;
            const params = `active=${isChecked ? 1 : 0}`;
            
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xhr.send(params);

            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    alert('Post status updated successfully');
                }
            };
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Manage Posts</h2>
        <a href="{{ url_for('add_post') }}">Add New Post</a>
        <h3>Existing Posts</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for post in posts %}
                <tr>
                    <td>{{ post.id_ttp }}</td>
                    <td>{{ post.judul_ttp }}</td>
                    <td>
                        <input type="checkbox" {% if post.active_ttp == '1' %} checked {% endif %} 
                               onclick="updatePostStatus({{ post.id_ttp }}, this.checked)">
                    </td>
                    <td>
                        <a href="{{ url_for('edit_post', id=post.id_ttp) }}">Edit</a>
                        <form action="{{ url_for('delete_post', id=post.id_ttp) }}" method="post" style="display:inline;">
                            <input type="submit" value="Delete" onclick="return confirm('Are you sure?')">
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
