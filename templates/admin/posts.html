<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Postingan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script>
        function updatePostStatus(id, isChecked) {
            const xhr = new XMLHttpRequest();
            const url = `/admin/update_post_active/${id}`;
            const params = `active=${isChecked ? 1 : 0}`;
            
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xhr.send(params);

            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    alert('Post status updated successfully');
                }
            };
        }
    </script>
</head>
<body>
    <h2 class="mt-4">Postingan</h2>
    <hr>
    <a href="{{ url_for('add_post') }}" class="btn btn-primary mb-3">Tambah Postingan</a>
    <h2 class="mt-4 text-center">Data Posts</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>No</th>
                <th>Judul</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for post in posts %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ post.judul_ttp }}</td>
                <td>
                    <input type="checkbox" {% if post.active_ttp == '1' %} checked {% endif %} 
                           onclick="updatePostStatus({{ post.id_ttp }}, this.checked)">
                </td>
                <td>
                    <a href="{{ url_for('edit_post', id=post.id_ttp) }}" class="btn btn-warning btn-sm">Edit</a>
                    <form action="{{ url_for('delete_post', id=post.id_ttp) }}" method="post" style="display:inline;">
                        <input type="submit" value="Delete" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
