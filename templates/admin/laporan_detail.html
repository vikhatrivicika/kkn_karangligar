<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Laporan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .field, .option {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .field .remove-field, .option .remove-option {
            margin-top: 10px;
        }
        .field .optionsContainer {
            margin-top: 10px;
        }
        .optionsFields .option {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Detail Laporan</h1>
        <form id="detailLaporanForm" class="mb-4">
            <input type="hidden" id="id_tmla" name="id_tmla" value="{{ id_tmla }}">
            <div id="fieldsContainer"></div>
            <div class="form-group mt-3">
                <button type="button" class="btn btn-warning" onclick="addField()">Add Field</button>
                <button type="submit" class="btn btn-primary">{{ 'Update' if is_update else 'Save' }}</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
    
    <script>
        const existingData = {{ detail_json | safe }};
        
        document.addEventListener('DOMContentLoaded', function() {
            if (Array.isArray(existingData) && existingData.length > 0) {
                existingData.forEach(field => addField(field));
            } else {
                addField();
            }

            const typeSelects = document.querySelectorAll('select[name="types[]"]');
            typeSelects.forEach(selectElement => {
                toggleOptions(selectElement);
            });
        });

        function addField(fieldData = {}) {
            const container = document.getElementById('fieldsContainer');
            const newField = document.createElement('div');
            newField.classList.add('field');
            newField.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Label:</label>
                            <input type="text" class="form-control" name="labels[]" value="${fieldData.label || ''}">
                        </div>
                        <div class="form-group">
                            <label>Type:</label>
                            <select class="form-control" name="types[]" onchange="toggleOptions(this)">
                                <option value="text" ${fieldData.type === 'text' ? 'selected' : ''}>Text</option>
                                <option value="select" ${fieldData.type === 'select' ? 'selected' : ''}>Select</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Max Length:</label>
                            <input type="number" class="form-control" name="max_lengths[]" value="${fieldData.max_length || ''}">
                        </div>
                        <div class="form-group">
                            <label>Font:</label>
                            <input type="text" class="form-control" name="fonts[]" value="${fieldData.font || ''}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Font Size:</label>
                            <input type="number" class="form-control" name="font_sizes[]" value="${fieldData.font_size || ''}">
                        </div>
                        <div class="form-group">
                            <label>Position X:</label>
                            <input type="number" class="form-control" name="positions_x[]" value="${fieldData.position ? fieldData.position.x : ''}">
                        </div>
                        <div class="form-group">
                            <label>Position Y:</label>
                            <input type="number" class="form-control" name="positions_y[]" value="${fieldData.position ? fieldData.position.y : ''}">
                        </div>
                    </div>
                </div>
                <div class="optionsContainer" style="display: ${fieldData.type === 'select' ? 'block' : 'none'};">
                    <label>Options:</label>
                    <div class="optionsFields">
                        ${(fieldData.options || []).map(option => `
                            <div class="option row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Option Value:</label>
                                        <input type="text" class="form-control" name="option_values[]" value="${option.label || ''}">
                                    </div>
                                    <div class="form-group">
                                        <label>Font:</label>
                                        <input type="text" class="form-control" name="option_fonts[]" value="${option.font || ''}">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Font Size:</label>
                                        <input type="number" class="form-control" name="option_font_sizes[]" value="${option.font_size || ''}">
                                    </div>
                                    <div class="form-group">
                                        <label>Position X:</label>
                                        <input type="number" class="form-control" name="option_positions_x[]" value="${option.position ? option.position.x : ''}">
                                    </div>
                                    <div class="form-group">
                                        <label>Position Y:</label>
                                        <input type="number" class="form-control" name="option_positions_y[]" value="${option.position ? option.position.y : ''}">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button type="button" class="btn btn-danger remove-option" onclick="removeOption(this)">Remove Option</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button type="button" class="btn btn-secondary mt-2" onclick="addOption(this)">Add Option</button>
                </div>
                <button type="button" class="btn btn-danger remove-field mt-3" onclick="removeField(this)">Remove Field</button>
            `;
            container.appendChild(newField);
        }

        function toggleOptions(selectElement) {
            const field = selectElement.closest('.field');
            const fieldAttributes = field.querySelector('.field-attributes');
            const optionsContainer = field.querySelector('.optionsContainer');
            if (selectElement.value === 'select') {
                fieldAttributes.style.display = 'none';
                optionsContainer.style.display = 'block';
            } else {
                fieldAttributes.style.display = 'block';
                optionsContainer.style.display = 'none';
            }
        }

        function addOption(button) {
            const optionsFields = button.closest('.optionsContainer').querySelector('.optionsFields');
            const newOption = document.createElement('div');
            newOption.classList.add('option', 'row');
            newOption.innerHTML = `
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Option Value:</label>
                        <input type="text" class="form-control" name="option_values[]">
                    </div>
                    <div class="form-group">
                        <label>Font:</label>
                        <input type="text" class="form-control" name="option_fonts[]">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Font Size:</label>
                        <input type="number" class="form-control" name="option_font_sizes[]">
                    </div>
                    <div class="form-group">
                        <label>Position X:</label>
                        <input type="number" class="form-control" name="option_positions_x[]">
                    </div>
                    <div class="form-group">
                        <label>Position Y:</label>
                        <input type="number" class="form-control" name="option_positions_y[]">
                    </div>
                </div>
                <div class="col-12">
                    <button type="button" class="btn btn-danger remove-option" onclick="removeOption(this)">Remove Option</button>
                </div>
            `;
            optionsFields.appendChild(newOption);
        }

        function removeField(button) {
            button.closest('.field').remove();
        }

        function removeOption(button) {
            button.closest('.option').remove();
        }

        document.getElementById('detailLaporanForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const labels = document.querySelectorAll('input[name="labels[]"]');
            const types = document.querySelectorAll('select[name="types[]"]');
            const max_lengths = document.querySelectorAll('input[name="max_lengths[]"]');
            const fonts = document.querySelectorAll('input[name="fonts[]"]');
            const font_sizes = document.querySelectorAll('input[name="font_sizes[]"]');
            const positions_x = document.querySelectorAll('input[name="positions_x[]"]');
            const positions_y = document.querySelectorAll('input[name="positions_y[]"]');
            const optionsContainers = document.querySelectorAll('.optionsFields');
            const id_tmla = document.getElementById('id_tmla').value;

            const fields = [];
            for (let i = 0; i < labels.length; i++) {
                const field = {
                    label: labels[i].value,
                    type: types[i].value,
                    name: labels[i].value.toLowerCase().replace(/\s+/g, '_'),
                    max_length: max_lengths[i].value,
                    font: fonts[i].value,
                    font_size: font_sizes[i].value,
                    position: {
                        x: positions_x[i].value,
                        y: positions_y[i].value
                    }
                };
                if (field.type === 'select') {
                    field.options = [];
                    const options = optionsContainers[i].querySelectorAll('.option');
                    options.forEach(option => {
                        const optionValue = option.querySelector('input[name="option_values[]"]').value.trim();
                        const optionFont = option.querySelector('input[name="option_fonts[]"]').value;
                        const optionFontSize = option.querySelector('input[name="option_font_sizes[]"]').value;
                        const optionPositionX = option.querySelector('input[name="option_positions_x[]"]').value;
                        const optionPositionY = option.querySelector('input[name="option_positions_y[]"]').value;

                        field.options.push({
                            label: optionValue,
                            value: optionValue.toLowerCase().replace(/\s+/g, '_'),
                            font: optionFont,
                            font_size: optionFontSize,
                            position: {
                                x: optionPositionX,
                                y: optionPositionY
                            }
                        });
                    });
                }
                fields.push(field);
            }

            const detailLaporan = { id_tmla, fields };

            console.log(JSON.stringify(detailLaporan));

            fetch('/admin/save_detail_laporan', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(detailLaporan)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                alert('Detail laporan berhasil disimpan!');
                window.location.href = '/admin'; 
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
