<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>{{ post.judul_ttp }}</title>
  <!-- Bootstrap core CSS -->
  <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <!-- Additional CSS Files -->
  <link rel="stylesheet" href="../static/assets/css/fontawesome.css">
  <link rel="stylesheet" href="../static/assets/css/templatemo-tale-seo-agency.css">
  <link rel="stylesheet" href="../static/assets/css/owl.css">
  <link rel="stylesheet" href="../static/assets/css/animate.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />
</head>
<body>
  <!-- Preloader -->
  <div id="js-preloader" class="js-preloader">
    <div class="preloader-inner">
      <span class="dot"></span>
      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <!-- Header Area Start -->
  <header class="header-area header-sticky">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <nav class="main-nav">
            <a href="{{ url_for('index') }}" class="logo">
              <img src="{{ url_for('static', filename='assets/images/logo.png') }}" alt="" style="max-width: 112px;">
            </a>
            <ul class="nav">
              <li class="scroll-to-section"><a href="{{ url_for('index') }}#top" class="active">Beranda</a></li>
              <li class="scroll-to-section"><a href="{{ url_for('index') }}#tentang">Informasi Desa</a></li>
              <li class="scroll-to-section"><a href="{{ url_for('index') }}#kegiatan">Kegiatan</a></li>
              <li class="scroll-to-section"><a href="{{ url_for('index') }}#info">Form</a></li>
              <li class="scroll-to-section"><a href="{{ url_for('index') }}#kontak">Kontak</a></li>
            </ul>
            <a class='menu-trigger'>
              <span>Menu</span>
            </a>
          </nav>
        </div>
      </div>
    </div>
  </header>
  <!-- Header Area End -->

  <div class="page-heading" id="top">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <h2>{{ post.judul_ttp }}</h2>
                <div class="line-dec" style="margin-bottom: 10px;"></div>
            </div>
        </div>
    </div>
  </div>

  <div class="blog-content section" style="margin-top: -100px;">
    <div class="container">
        <div class="row">
            <div class="col-lg-12" style="text-align: justify;">
                <div class="post-content">
                    {{ post.postingan_ttp | safe }}
                </div>
            </div>
        </div>
    </div>
  </div>


  <footer>
    <div class="container">
      <div class="col-lg-12">
        <p>Copyright © 2036 <a href="#">KKN Universitas XYZ</a>. All rights reserved.
          <br>Design: <a href="https://templatemo.com" target="_blank">TemplateMo</a> Distribution: <a href="https://themewagon.com">ThemeWagon</a>
        </p>
      </div>
    </div>
  </footer>
  <!-- Scripts -->
  <script src="../static/vendor/jquery/jquery.min.js"></script>
  <script src="../static/vendor/bootstrap/js/bootstrap.min.js"></script>
  <script src="../static/assets/js/isotope.min.js"></script>
  <script src="../static/assets/js/owl-carousel.js"></script>
  <script src="../static/assets/js/tabs.js"></script>
  <script src="../static/assets/js/popup.js"></script>
  <script src="../static/assets/js/custom.js"></script>
</body>
</html>
