<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Informasi {{ nama_surat }}</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="text-center mt-4">{{ nama_surat }}</h2>
                <form method="POST" class="form-container">
                    {% for field in fields %}
                    <div class="form-group">
                        <label for="{{ field.name }}">{{ field.label }}</label>
                        {% if field.type == 'text' %}
                        <input type="text" class="form-control" id="{{ field.name }}" name="{{ field.name }}" maxlength="{{ field.max_length }}" required>
                        {% elif field.type == 'select' %}
                        <select class="form-control" id="{{ field.name }}" name="{{ field.name }}" required>
                            {% for option in field.options %}
                            <option value="{{ option.value }}">{{ option.label }}</option>
                            {% endfor %}
                        </select>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
